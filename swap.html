<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROXs Swap — Quantum Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f0ff;
            --pink: #ff00ea;
            --dark: #020408;
            --card-bg: rgba(0, 240, 255, 0.04);
            --card-inner: rgba(0, 0, 0, 0.4);
            --border: rgba(0, 240, 255, 0.15);
            --text-dim: rgba(255,255,255,0.6);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        canvas { position:fixed; top:0; left:0; z-index:0; pointer-events:none; }

        /* NAV */
        nav {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(15px);
        }

        .nav-logo {
            font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 900;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px; text-decoration: none;
        }

        .btn-connect {
            font-family: 'Space Mono'; font-size: 0.75rem;
            padding: 10px 20px; border-radius: 30px;
            border: 1px solid var(--cyan); background: transparent;
            color: var(--cyan); cursor: pointer; transition: 0.3s;
        }

        .btn-connect:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* SWAP CONTAINER */
        main {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 1; padding: 40px 20px;
        }

        .swap-card {
            width: 100%; max-width: 420px;
            background: rgba(10, 14, 26, 0.85);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .swap-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .swap-header h2 {
            font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 1px;
            color: var(--cyan);
        }

        /* INPUTS — ESTILO UNISWAP */
        .input-group {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 16px 18px;
            margin-bottom: 8px; transition: border-color 0.3s, box-shadow 0.3s;
            cursor: text;
        }

        .input-group:focus-within {
            border-color: rgba(0, 240, 255, 0.35);
            box-shadow: 0 0 14px rgba(0, 240, 255, 0.08);
        }

        .input-label {
            font-family: 'Space Mono'; font-size: 0.72rem;
            color: var(--text-dim); margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }

        .input-row {
            display: flex; justify-content: space-between; align-items: center;
            gap: 12px;
        }

        /* Número grande estilo Uniswap */
        .amount-input {
            background: none; border: none; color: white;
            font-family: 'Space Mono'; font-size: 2rem; font-weight: 700;
            width: 0; flex: 1; outline: none;
            min-width: 0;
            -moz-appearance: textfield;
        }

        .amount-input::-webkit-outer-spin-button,
        .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .amount-input::placeholder { color: rgba(255,255,255,0.25); }

        /* TOKEN SELECTOR */
        .token-selector {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 12px; border-radius: 40px;
            cursor: pointer; transition: 0.2s;
            white-space: nowrap; flex-shrink: 0;
            position: relative;
        }

        .token-selector:hover {
            background: rgba(255,255,255,0.11);
        }

        .token-selector select {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
        }

        .token-icon-wrap {
            width: 24px; height: 24px; border-radius: 50%;
            overflow: hidden; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
        }

        .token-icon-wrap svg { width: 100%; height: 100%; }

        .token-name {
            font-family: 'Orbitron'; font-size: 0.82rem; font-weight: 700;
            color: #fff;
        }

        .token-chevron {
            font-size: 0.6rem; color: var(--text-dim); margin-left: 2px;
        }

        .balance-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 8px;
        }

        .usd-value {
            font-family: 'Space Mono'; font-size: 0.72rem; color: var(--text-dim);
        }

        .balance-text {
            font-family: 'Space Mono'; font-size: 0.72rem; color: var(--text-dim);
        }

        /* SWAP ARROW */
        .swap-divider {
            height: 40px; margin: -24px 0;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 2;
        }

        .arrow-btn {
            width: 36px; height: 36px;
            background: #0d1220; border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px; color: var(--cyan);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-size: 1rem;
            user-select: none;
        }

        .arrow-btn:hover {
            border-color: var(--cyan);
            transform: rotate(180deg);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        /* MAIN BUTTON */
        .btn-swap-execute {
            width: 100%; margin-top: 20px;
            padding: 16px; border-radius: 16px;
            border: none; font-family: 'Orbitron';
            font-weight: 900; font-size: 0.9rem;
            letter-spacing: 2px; cursor: pointer;
            background: rgba(255,255,255,0.05);
            color: var(--text-dim);
            transition: 0.3s;
        }

        .btn-swap-execute.active {
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 234, 0.4);
        }

        .btn-swap-execute.active:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
        }

        .price-row {
            display: flex; justify-content: space-between;
            font-family: 'Space Mono'; font-size: 0.7rem;
            color: var(--text-dim); margin: 12px 4px 0;
        }

        footer {
            position: relative; z-index: 10;
            padding: 20px; text-align: center;
            font-family: 'Space Mono'; font-size: 0.7rem;
            color: var(--text-dim); border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <nav>
        <a href="#" class="nav-logo">ROXs SWAP</a>
        <button class="btn-connect" id="connectBtn">CONNECT WALLET</button>
    </nav>

    <main>
        <div class="swap-card">
            <div class="swap-header">
                <h2>SWAP ASSETS</h2>
                <span style="cursor:pointer; opacity: 0.5; font-size:1.1rem;">⚙️</span>
            </div>

            <!-- SELL -->
            <div class="input-group" id="sellGroup">
                <div class="input-label">Sell</div>
                <div class="input-row">
                    <input type="text" inputmode="decimal" id="inputAmount" class="amount-input" placeholder="0">
                    <div class="token-selector" id="sellTokenSelector">
                        <div class="token-icon-wrap" id="sellIconWrap"></div>
                        <span class="token-name" id="sellTokenName">POL</span>
                        <span class="token-chevron">▼</span>
                        <select id="sellToken">
                            <option value="POL">POL</option>
                            <option value="USDT">USDT</option>
                        </select>
                    </div>
                </div>
                <div class="balance-row">
                    <span class="usd-value" id="sellUSD">$0.00</span>
                    <span class="balance-text">Balance: 0.00</span>
                </div>
            </div>

            <div class="swap-divider">
                <div class="arrow-btn" id="arrowBtn">↓</div>
            </div>

            <!-- BUY -->
            <div class="input-group" id="buyGroup">
                <div class="input-label">Buy</div>
                <div class="input-row">
                    <input type="text" inputmode="numeric" id="outputAmount" class="amount-input" placeholder="0">
                    <div class="token-selector">
                        <div class="token-icon-wrap" id="buyIconWrap"></div>
                        <span class="token-name">ROXs</span>
                        <span class="token-chevron">▼</span>
                    </div>
                </div>
                <div class="balance-row">
                    <span class="usd-value" id="buyUSD">$0.00</span>
                    <span class="balance-text">Balance: 0</span>
                </div>
            </div>

            <div class="price-row">
                <span>Price</span>
                <span id="priceLabel" style="color: var(--cyan);">1 POL = 12.5M ROXs</span>
            </div>

            <button class="btn-swap-execute" id="swapBtn">ENTER AMOUNT</button>

            <div class="price-row" style="margin-top: 12px;">
                <span>Slippage Tolerance</span>
                <span style="color: var(--cyan);">0.5%</span>
            </div>
        </div>
    </main>

    <footer>
        ROXs PROTOCOL © 2026 • BUILT ON POLYGON L2
    </footer>

    <script>
        /* ──────────── TOKEN ICONS SVG ──────────── */
        const TOKEN_ICONS = {
            POL: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="16" fill="#8247E5"/>
                <path d="M20.3 13.2c-.4-.2-.9-.2-1.3 0l-3 1.7-2 1.2-3 1.7c-.4.2-.9.2-1.3 0l-2.4-1.4c-.4-.2-.6-.6-.6-1v-2.7c0-.4.2-.8.6-1l2.4-1.3c.4-.2.9-.2 1.3 0l2.4 1.4c.4.2.6.6.6 1v1.7l2-1.2v-1.8c0-.4-.2-.8-.6-1l-4.3-2.5c-.4-.2-.9-.2-1.3 0l-4.4 2.6c-.4.2-.6.6-.6 1v5.1c0 .4.2.8.6 1l4.4 2.5c.4.2.9.2 1.3 0l3-1.7 2-1.1 3-1.7c.4-.2.9-.2 1.3 0l2.4 1.3c.4.2.6.6.6 1v2.7c0 .4-.2.8-.6 1l-2.4 1.4c-.4.2-.9.2-1.3 0l-2.4-1.4c-.4-.2-.6-.6-.6-1v-1.7l-2 1.2v1.7c0 .4.2.8.6 1l4.4 2.5c.4.2.9.2 1.3 0l4.4-2.5c.4-.2.6-.6.6-1v-5.1c0-.4-.2-.8-.6-1l-4.5-2.6z" fill="white"/>
            </svg>`,
            USDT: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="16" fill="#26A17B"/>
                <path d="M17.9 17.4c-.1 0-.8.1-1.9.1s-1.8-.1-1.9-.1c-3.7-.2-6.5-.8-6.5-1.6s2.8-1.4 6.5-1.6v2.5c.1 0 .8.1 1.9.1s1.8-.1 1.9-.1v-2.5c3.7.2 6.5.8 6.5 1.6s-2.8 1.4-6.5 1.6zM17.9 13.5v-2.2H22V8.5H10v2.8h4.1v2.2c-4.2.2-7.3 1-7.3 2.1s3.1 1.9 7.3 2.1v7.8h3.8v-7.8c4.2-.2 7.3-1 7.3-2.1s-3.1-1.9-7.3-2.1z" fill="white"/>
            </svg>`,
            ROXs: `<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="16" fill="#1a0025"/>
                <circle cx="16" cy="16" r="14" fill="none" stroke="#ff00ea" stroke-width="1.5"/>
                <text x="16" y="21" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="11" fill="#ff00ea">RX</text>
            </svg>`
        };

        function setTokenIcon(container, token) {
            container.innerHTML = TOKEN_ICONS[token] || TOKEN_ICONS['ROXs'];
        }

        /* ──────────── INICIALIZAR ICONOS ──────────── */
        const sellIconWrap = document.getElementById('sellIconWrap');
        const buyIconWrap  = document.getElementById('buyIconWrap');

        setTokenIcon(sellIconWrap, 'POL');
        setTokenIcon(buyIconWrap, 'ROXs');

        /* ──────────── RATES ──────────── */
        const RATES = {
            POL:  { rate: 12500000, label: '1 POL = 12.5M ROXs',  usdPer: 0.2 },
            USDT: { rate: 132500000, label: '1 USDT = 132.5M ROXs', usdPer: 1.0 }
        };

        let currentToken = 'POL';

        const sellToken   = document.getElementById('sellToken');
        const sellName    = document.getElementById('sellTokenName');
        const priceLabel  = document.getElementById('priceLabel');
        const inputEl     = document.getElementById('inputAmount');
        const outputEl    = document.getElementById('outputAmount');
        const sellUSD     = document.getElementById('sellUSD');
        const buyUSD      = document.getElementById('buyUSD');
        const swapBtn     = document.getElementById('swapBtn');
        const connectBtn  = document.getElementById('connectBtn');

        function formatBuy(num) {
            return Math.round(num).toLocaleString('en-US').replace(/,/g, ',');
        }

        function updateOutput() {
            const raw = inputEl.value.replace(/[^0-9.]/g, '');
            const val = parseFloat(raw);
            const cfg = RATES[currentToken];

            if (raw === '' || isNaN(val) || val <= 0) {
                outputEl.value = '';
                sellUSD.textContent = '$0.00';
                buyUSD.textContent = '$0.00';
                swapBtn.innerText = 'ENTER AMOUNT';
                swapBtn.classList.remove('active');
                return;
            }

            const roxsAmt = val * cfg.rate;
            outputEl.value = formatBuy(roxsAmt);
            sellUSD.textContent = '$' + (val * cfg.usdPer).toFixed(2);
            buyUSD.textContent = '$' + (val * cfg.usdPer).toFixed(2);
            swapBtn.innerText = 'SWAP ASSETS';
            swapBtn.classList.add('active');
        }

        /* Sell input — permite decimales */
        inputEl.addEventListener('input', (e) => {
            let v = e.target.value;
            // Solo números y un punto
            v = v.replace(/[^0-9.]/g, '');
            const parts = v.split('.');
            if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
            e.target.value = v;
            updateOutput();
        });

        /* Buy input — solo enteros, editable */
        outputEl.addEventListener('input', (e) => {
            let v = e.target.value.replace(/[^0-9]/g, '');
            e.target.value = v ? parseInt(v, 10).toLocaleString('en-US').replace(/,/g, ',') : '';

            const roxsAmt = parseInt(v, 10) || 0;
            const cfg = RATES[currentToken];
            if (roxsAmt > 0) {
                const sellAmt = roxsAmt / cfg.rate;
                inputEl.value = sellAmt % 1 === 0 ? sellAmt.toString() : sellAmt.toFixed(6).replace(/\.?0+$/, '');
                sellUSD.textContent = '$' + (sellAmt * cfg.usdPer).toFixed(2);
                buyUSD.textContent  = '$' + (sellAmt * cfg.usdPer).toFixed(2);
                swapBtn.innerText = 'SWAP ASSETS';
                swapBtn.classList.add('active');
            } else {
                inputEl.value = '';
                sellUSD.textContent = '$0.00';
                buyUSD.textContent  = '$0.00';
                swapBtn.innerText = 'ENTER AMOUNT';
                swapBtn.classList.remove('active');
            }
        });

        /* Token selector */
        sellToken.addEventListener('change', () => {
            currentToken = sellToken.value;
            sellName.textContent = currentToken;
            setTokenIcon(sellIconWrap, currentToken);
            priceLabel.textContent = RATES[currentToken].label;
            updateOutput();
        });

        /* Arrow swap button */
        document.getElementById('arrowBtn').addEventListener('click', () => {
            inputEl.value  = '';
            outputEl.value = '';
            sellUSD.textContent = '$0.00';
            buyUSD.textContent  = '$0.00';
            swapBtn.innerText = 'ENTER AMOUNT';
            swapBtn.classList.remove('active');
        });

        connectBtn.addEventListener('click', () => {
            connectBtn.innerText = "0x94C...D05E";
            connectBtn.style.borderColor = "var(--pink)";
            connectBtn.style.color = "var(--pink)";
        });

        /* ──────────── PARTÍCULAS ──────────── */
        const canvas = document.getElementById('particles');
        const ctx    = canvas.getContext('2d');
        let W, H, pts = [];

        function resize(){
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        for(let i = 0; i < 100; i++){
            pts.push({
                x: Math.random(), y: Math.random(),
                vx: (Math.random() - 0.5) * 0.0003,
                vy: (Math.random() - 0.5) * 0.0003,
                r: Math.random() * 2,
                a: Math.random()
            });
        }

        function draw(){
            ctx.clearRect(0, 0, W, H);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0) p.x = 1; if(p.x > 1) p.x = 0;
                if(p.y < 0) p.y = 1; if(p.y > 1) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x * W, p.y * H, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 240, 255, ${p.a * 0.6})`;
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
