<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ROXs Swap | Professional Exchange</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #F0C040;
      --bg: #050505;
      --surface: #0f0f0f;
      --surface2: #161616;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #888;
      --error: #ff4d4d;
      --error-alt: #ff0000; 
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex; flex-direction: column; align-items: center; padding: 20px;
      min-height: 100vh;
    }

    nav {
      width: 100%; max-width: 480px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 2rem;
    }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--gold); text-decoration: none; font-size: 22px; }
    
    .wallet-status {
      background: var(--surface2); border: 1px solid var(--border);
      padding: 8px 16px; border-radius: 50px; cursor: pointer; display: none;
      align-items: center; gap: 8px; font-size: 13px; color: var(--gold);
      font-family: 'Syne', sans-serif; font-weight: 600;
    }
    .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

    .swap-card {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 20px;
      position: relative;
    }

    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card-header h2 { font-family: 'Syne', sans-serif; font-size: 18px; }
    .settings-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; }

    .settings-panel {
      display: none; position: absolute; top: 60px; right: 20px;
      background: #1a1a1a; border: 1px solid var(--border);
      border-radius: 12px; padding: 15px; z-index: 100; width: 240px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .settings-panel.open { display: block; }
    .slip-title { font-size: 12px; color: var(--muted); margin-bottom: 10px; display: block; }
    .slip-grid { display: flex; gap: 5px; }
    .slip-opt { 
        flex: 1; background: #000; border: 1px solid var(--border); 
        border-radius: 8px; padding: 6px; color: var(--muted); 
        cursor: pointer; font-size: 11px; text-align: center;
    }
    .slip-opt.active { border-color: var(--gold); color: var(--gold); }

    .token-box {
      background: var(--surface2); border-radius: 16px; padding: 16px;
      border: 1px solid transparent; margin-bottom: 4px; transition: 0.2s;
    }
    .label { font-size: 12px; color: var(--muted); margin-bottom: 12px; display: block; }
    
    .input-row { display: flex; justify-content: space-between; align-items: center; }
    .amount-input {
      background: none; border: none; color: white; font-size: 30px;
      font-family: 'Syne', sans-serif; width: 60%; outline: none; font-weight: 600;
    }
    .amount-input.red-text { color: var(--error-alt) !important; }
    
    .token-select {
      background: #000; border: 1px solid var(--border); border-radius: 50px;
      padding: 6px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;
      position: relative;
    }
    .token-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; }
    .icon-pol { background: #8247e5; color: white; }
    .icon-usdt { background: #26a17b; color: white; }
    .icon-roxs { background: var(--gold); color: black; }

    .balance-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 12px; }
    .balance-red { color: var(--error-alt); }
    .max-btn { color: var(--gold); background: none; border: none; cursor: pointer; font-weight: bold; font-size: 11px; }

    .arrow-container { display: flex; justify-content: center; margin: -20px 0; position: relative; z-index: 2; }
    .arrow-btn {
      height: 36px; width: 36px; background: var(--surface); border: 4px solid var(--bg);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--gold); transition: 0.2s;
    }

    .error-banner {
      background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.15);
      color: var(--error); padding: 12px; border-radius: 12px; font-size: 13px;
      margin-top: 12px; display: none; align-items: center; gap: 8px;
    }
    .error-banner.show { display: flex; }

    .btn-action {
      width: 100%; padding: 18px; border-radius: 16px; border: none;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px;
      cursor: pointer; transition: 0.3s; margin-top: 10px;
    }
    .btn-connect { background: var(--gold); color: black; }
    .btn-swap { background: var(--gold); color: black; display: none; }

    /* TOKEN DROPDOWN */
    .token-dropdown {
      display: none; position: absolute; top: 100%; left: 0; 
      background: #1a1a1a; border: 1px solid var(--border);
      border-radius: 12px; width: 120px; z-index: 10; margin-top: 5px;
    }
    .token-dropdown.show { display: block; }
    .dd-item { padding: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .dd-item:hover { background: #252525; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal { background: #111; border: 1px solid var(--border); border-radius: 24px; padding: 24px; width: 90%; max-width: 380px; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">ROXs</a>
    <div class="wallet-status" id="walletDisplay" onclick="disconnect()">
      <div class="dot"></div>
      <span id="addrText">0x...</span>
    </div>
  </nav>

  <div class="swap-card">
    <div class="card-header">
      <h2>Swap</h2>
      <button class="settings-btn" id="setBtn">⚙️</button>
      <div class="settings-panel" id="setPanel">
        <span class="slip-title">Slippage Tolerance</span>
        <div class="slip-grid">
          <div class="slip-opt active" onclick="setSlippage('Auto', this)">Auto</div>
          <div class="slip-opt" onclick="setSlippage(0.1, this)">0.1%</div>
          <div class="slip-opt" onclick="setSlippage(0.5, this)">0.5%</div>
        </div>
      </div>
    </div>

    <div class="token-box">
      <span class="label">Sell</span>
      <div class="input-row">
        <input type="number" class="amount-input" id="valIn" placeholder="0" oninput="calculate()">
        <div class="token-select" onclick="toggleDropdown(event)">
          <div id="iconIn" class="token-icon icon-pol">P</div>
          <span id="symIn">POL</span> <small>▼</small>
          <div class="token-dropdown" id="tokenDd">
            <div class="dd-item" onclick="selectToken('POL')">POL</div>
            <div class="dd-item" onclick="selectToken('USDT')">USDT</div>
          </div>
        </div>
      </div>
      <div class="balance-row">
        <span id="usdIn">$0.00</span>
        <span>Balance: <span id="balInText">0.00</span> <button class="max-btn" id="maxBtn" onclick="setMax()" style="display:none">MAX</button></span>
      </div>
    </div>

    <div class="arrow-container">
      <div class="arrow-btn" onclick="flip()">↓</div>
    </div>

    <div class="token-box">
      <span class="label">Buy</span>
      <div class="input-row">
        <input type="number" class="amount-input" id="valOut" placeholder="0" readonly>
        <div class="token-select">
          <div id="iconOut" class="token-icon icon-roxs">R</div>
          <span id="symOut">ROXs</span>
        </div>
      </div>
      <div class="balance-row">
        <span id="usdOut">$0.00</span>
        <span>Balance: <span id="balOutText">0.00</span></span>
      </div>
    </div>

    <div class="error-banner" id="errorMsg">
      ⚠️ Insufficient <span id="errToken">POL</span> balance
    </div>

    <button class="btn-action btn-connect" id="connBtn" onclick="openModal()">Connect Wallet</button>
    <button class="btn-action btn-swap" id="swapBtn" disabled onclick="executeSwap()">Swap</button>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
        <h3 style="margin-bottom:20px">Connect Wallet</h3>
        <button class="btn-action btn-connect" onclick="connect()">MetaMask</button>
        <button class="btn-action" style="background:#222; color:white; margin-top:10px" onclick="closeModal()">Cancel</button>
    </div>
  </div>

<script>
  let state = {
    connected: false,
    tokenIn: 'POL',
    tokenOut: 'ROXs',
    balances: { POL: 1.00, USDT: 0.00, ROXs: 0.00 }, // Initial Real state
    prices: { POL: 0.22, USDT: 1.00, ROXs: 0.00000001734 },
    rate: 12803400,
    slippage: 'Auto'
  };

  function calculate() {
    const valIn = parseFloat(document.getElementById('valIn').value) || 0;
    const valInEl = document.getElementById('valIn');
    const swapBtn = document.getElementById('swapBtn');
    const errorMsg = document.getElementById('errorMsg');

    let amountOut = state.tokenIn === 'ROXs' ? valIn / state.rate : valIn * state.rate;
    document.getElementById('valOut').value = amountOut > 0 ? amountOut.toFixed(0) : '';

    // Insufficient Balance logic
    const hasEnough = state.connected ? (valIn <= state.balances[state.tokenIn]) : true;
    
    if (!hasEnough && state.connected) {
        valInEl.classList.add('red-text');
        errorMsg.classList.add('show');
        document.getElementById('errToken').textContent = state.tokenIn;
        swapBtn.disabled = true;
    } else {
        valInEl.classList.remove('red-text');
        errorMsg.classList.remove('show');
        swapBtn.disabled = !state.connected || valIn <= 0;
    }

    // Dynamic Balance Text color
    if (state.connected && state.balances[state.tokenIn] === 0) {
        document.getElementById('balInText').classList.add('balance-red');
    } else {
        document.getElementById('balInText').classList.remove('balance-red');
    }
  }

  function setMax() {
    // Deduct standard Polygon gas fee (~0.05 POL) only if selling POL
    let fee = (state.tokenIn === 'POL') ? 0.05 : 0;
    let max = state.balances[state.tokenIn] - fee;
    document.getElementById('valIn').value = max > 0 ? max.toFixed(2) : 0;
    calculate();
  }

  function flip() {
    [state.tokenIn, state.tokenOut] = [state.tokenOut, state.tokenIn];
    document.getElementById('symIn').textContent = state.tokenIn;
    document.getElementById('symOut').textContent = state.tokenOut;
    document.getElementById('iconIn').className = `token-icon icon-${state.tokenIn.toLowerCase()}`;
    document.getElementById('iconOut').className = `token-icon icon-${state.tokenOut.toLowerCase()}`;
    updateUI();
  }

  function selectToken(t) {
    state.tokenIn = t;
    document.getElementById('symIn').textContent = t;
    document.getElementById('iconIn').className = `token-icon icon-${t.toLowerCase()}`;
    document.getElementById('iconIn').textContent = t[0];
    updateUI();
  }

  function updateUI() {
    document.getElementById('balInText').textContent = state.connected ? state.balances[state.tokenIn] + " " + state.tokenIn : "0.00";
    document.getElementById('balOutText').textContent = state.connected ? state.balances[state.tokenOut] + " " + state.tokenOut : "0.00";
    calculate();
  }

  function connect() {
    state.connected = true;
    closeModal();
    document.getElementById('connBtn').style.display = 'none';
    document.getElementById('swapBtn').style.display = 'block';
    document.getElementById('walletDisplay').style.display = 'flex';
    document.getElementById('maxBtn').style.display = 'inline-block';
    updateUI();
  }

  function toggleDropdown(e) { e.stopPropagation(); document.getElementById('tokenDd').classList.toggle('show'); }
  function openModal() { document.getElementById('modal').classList.add('open'); }
  function closeModal() { document.getElementById('modal').classList.remove('open'); }
  window.onclick = () => { 
    document.getElementById('tokenDd').classList.remove('show');
    document.getElementById('setPanel').classList.remove('open'); 
  };
  document.getElementById('setBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('setPanel').classList.toggle('open'); };
</script>
</body>
</html>
