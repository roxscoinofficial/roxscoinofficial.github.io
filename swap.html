<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROXs Swap — Quantum Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f0ff;
            --pink: #ff00ea;
            --dark: #020408;
            --card-bg: rgba(0, 240, 255, 0.04);
            --card-inner: rgba(0, 0, 0, 0.4);
            --border: rgba(0, 240, 255, 0.15);
            --text-dim: rgba(255,255,255,0.6);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Fondo de Partículas */
        canvas { position:fixed; top:0; left:0; z-index:0; pointer-events:none; }

        /* NAV */
        nav {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(15px);
        }

        .nav-logo {
            font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 900;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px; text-decoration: none;
        }

        .btn-connect {
            font-family: 'Space Mono'; font-size: 0.75rem;
            padding: 10px 20px; border-radius: 30px;
            border: 1px solid var(--cyan); background: transparent;
            color: var(--cyan); cursor: pointer; transition: 0.3s;
        }

        .btn-connect:hover {
            background: rgba(0, 240, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* SWAP CONTAINER */
        main {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 1; padding: 40px 20px;
        }

        .swap-card {
            width: 100%; max-width: 420px;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 240, 255, 0.05);
        }

        .swap-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .swap-header h2 {
            font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 1px;
            color: var(--cyan);
        }

        /* INPUTS */
        .input-group {
            background: var(--card-inner);
            border: 1px solid var(--border);
            border-radius: 18px; padding: 16px;
            margin-bottom: 8px; transition: 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .input-row { display: flex; justify-content: space-between; align-items: center; }

        input {
            background: none; border: none; color: white;
            font-family: 'Space Mono'; font-size: 1.5rem;
            width: 60%; outline: none;
        }

        .token-pill {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.05);
            padding: 6px 12px; border-radius: 30px;
            font-family: 'Orbitron'; font-size: 0.8rem; font-weight: bold;
        }

        .token-icon { width: 20px; height: 20px; border-radius: 50%; }
        .poly { background: #8247e5; box-shadow: 0 0 10px #8247e5; }
        .roxs { background: var(--pink); box-shadow: 0 0 10px var(--pink); }

        .balance-info {
            display: flex; justify-content: space-between;
            font-family: 'Space Mono'; font-size: 0.7rem;
            color: var(--text-dim); margin-top: 8px;
        }

        /* SWAP ARROW */
        .swap-divider {
            height: 40px; margin: -24px 0;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 2;
        }

        .arrow-btn {
            width: 36px; height: 36px;
            background: #0a0e1a; border: 1px solid var(--border);
            border-radius: 10px; color: var(--cyan);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }

        .arrow-btn:hover {
            border-color: var(--cyan);
            transform: rotate(180deg);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        /* MAIN BUTTON */
        .btn-swap-execute {
            width: 100%; margin-top: 20px;
            padding: 16px; border-radius: 16px;
            border: none; font-family: 'Orbitron';
            font-weight: 900; font-size: 0.9rem;
            letter-spacing: 2px; cursor: pointer;
            background: var(--border); color: var(--text-dim);
            transition: 0.3s;
        }

        .btn-swap-execute.active {
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            color: #000;
            box-shadow: 0 0 20px rgba(255, 0, 234, 0.4);
        }

        .btn-swap-execute.active:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
        }

        footer {
            position: relative; z-index: 10;
            padding: 20px; text-align: center;
            font-family: 'Space Mono'; font-size: 0.7rem;
            color: var(--text-dim); border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <nav>
        <a href="#" class="nav-logo">ROXs SWAP</a>
        <button class="btn-connect" id="connectBtn">CONNECT WALLET</button>
    </nav>

    <main>
        <div class="swap-card">
            <div class="swap-header">
                <h2>SWAP ASSETS</h2>
                <span style="cursor:pointer; opacity: 0.5;">⚙️</span>
            </div>

            <!-- Entrada -->
            <div class="input-group">
                <div class="input-row">
                    <input type="number" id="inputAmount" placeholder="0.0">
                    <div class="token-pill">
                        <div class="token-icon poly"></div>
                        POL
                    </div>
                </div>
                <div class="balance-info">
                    <span>~$0.00</span>
                    <span>Balance: 0.00</span>
                </div>
            </div>

            <div class="swap-divider">
                <div class="arrow-btn">↓</div>
            </div>

            <!-- Salida -->
            <div class="input-group">
                <div class="input-row">
                    <input type="number" id="outputAmount" placeholder="0.0" readonly>
                    <div class="token-pill">
                        <div class="token-icon roxs"></div>
                        ROXs
                    </div>
                </div>
                <div class="balance-info">
                    <span>~$0.00</span>
                    <span>Balance: 0.00</span>
                </div>
            </div>

            <div class="balance-info" style="margin: 10px 5px;">
                <span>Price</span>
                <span>1 POL = 12.5M ROXs</span>
            </div>

            <button class="btn-swap-execute" id="swapBtn">ENTER AMOUNT</button>

            <div class="balance-info" style="margin-top: 15px; padding: 0 5px;">
                <span>Slippage Tolerance</span>
                <span style="color: var(--cyan);">0.5%</span>
            </div>
        </div>
    </main>

    <footer>
        ROXs PROTOCOL © 2026 • BUILT ON POLYGON L2
    </footer>

    <script>
        /* PARTÍCULAS ESPACIALES */
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let W, H, pts = [];

        function resize(){
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        for(let i=0;i<100;i++){
            pts.push({
                x: Math.random(), y: Math.random(),
                vx: (Math.random() - 0.5) * 0.0003,
                vy: (Math.random() - 0.5) * 0.0003,
                r: Math.random() * 2,
                a: Math.random()
            });
        }

        function draw(){
            ctx.clearRect(0,0,W,H);
            pts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0) p.x=1; if(p.x>1) p.x=0;
                if(p.y<0) p.y=1; if(p.y>1) p.y=0;
                ctx.beginPath();
                ctx.arc(p.x*W, p.y*H, p.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(0, 240, 255, ${p.a})`;
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();

        /* LÓGICA DE INTERFAZ */
        const input = document.getElementById('inputAmount');
        const output = document.getElementById('outputAmount');
        const swapBtn = document.getElementById('swapBtn');
        const connectBtn = document.getElementById('connectBtn');

        const RATE = 12500000; // 12.5 Millones

        input.addEventListener('input', (e) => {
            const val = e.target.value;
            if(val > 0) {
                output.value = (val * RATE).toLocaleString();
                swapBtn.innerText = "SWAP ASSETS";
                swapBtn.classList.add('active');
            } else {
                output.value = "";
                swapBtn.innerText = "ENTER AMOUNT";
                swapBtn.classList.remove('active');
            }
        });

        connectBtn.addEventListener('click', () => {
            connectBtn.innerText = "0x94C...D05E";
            connectBtn.style.borderColor = "var(--pink)";
            connectBtn.style.color = "var(--pink)";
        });
    </script>
</body>
</html>
