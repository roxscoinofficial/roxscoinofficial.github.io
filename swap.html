<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ROXs Swap | Real V2 Logic</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #F0C040;
      --bg: #050505;
      --surface: #0f0f0f;
      --surface2: #161616;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #888;
      --error-red: #ff0000;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex; flex-direction: column; align-items: center; padding: 20px;
    }

    /* NAV */
    nav { width: 100%; max-width: 440px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--gold); text-decoration: none; font-size: 22px; }
    .wallet-status {
      background: var(--surface2); border: 1px solid var(--border);
      padding: 8px 16px; border-radius: 50px; cursor: pointer; display: none;
      align-items: center; gap: 8px; font-size: 13px; color: var(--gold);
    }
    .dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; }

    /* CARD */
    .swap-card { width: 100%; max-width: 440px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; }
    
    .token-box { background: var(--surface2); border-radius: 16px; padding: 16px; margin-bottom: 4px; border: 1px solid transparent; }
    .label { font-size: 12px; color: var(--muted); margin-bottom: 12px; display: block; }
    
    .input-row { display: flex; justify-content: space-between; align-items: center; }
    .amount-input {
      background: none; border: none; color: white; font-size: 28px;
      font-family: 'Syne', sans-serif; width: 60%; outline: none; font-weight: 600;
    }
    /* Red text for numbers when balance is 0 */
    .amount-input.insufficient { color: var(--error-red) !important; }
    
    .token-select { background: #000; border: 1px solid var(--border); border-radius: 50px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; }
    .token-icon { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; }
    .icon-pol { background: #8247e5; color: white; }
    .icon-roxs { background: var(--gold); color: black; }

    .balance-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 12px; }
    .bal-val.red { color: var(--error-red); font-weight: bold; }
    .max-btn { color: var(--gold); background: none; border: none; cursor: pointer; font-weight: bold; }

    .arrow { text-align: center; margin: -18px 0; font-size: 20px; color: var(--gold); cursor: pointer; position: relative; z-index: 2; }

    .btn-action { width: 100%; padding: 18px; border-radius: 16px; border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; cursor: pointer; margin-top: 10px; }
    .btn-connect { background: var(--gold); color: black; }
    .btn-swap { background: var(--gold); color: black; display: none; }
    .btn-swap:disabled { background: #222; color: #555; cursor: not-allowed; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">ROXs</a>
    <div class="wallet-status" id="walletActive" onclick="disconnect()">
      <div class="dot"></div> <span id="addr">0x71...C8A2</span>
    </div>
  </nav>

  <div class="swap-card">
    <div class="token-box">
      <span class="label">Sell</span>
      <div class="input-row">
        <input type="number" class="amount-input" id="valIn" placeholder="0" oninput="calc()">
        <div class="token-select">
          <div id="icoIn" class="token-icon icon-pol">P</div> <span id="symIn">POL</span>
        </div>
      </div>
      <div class="balance-row">
        <span>$0.00</span>
        <span>Balance: <span id="balIn" class="bal-val">0.00</span> <button class="max-btn" id="maxBtn" style="display:none" onclick="setMax()">MAX</button></span>
      </div>
    </div>

    <div class="arrow" onclick="flip()">↓</div>

    <div class="token-box">
      <span class="label">Buy</span>
      <div class="input-row">
        <input type="number" class="amount-input" id="valOut" placeholder="0" readonly>
        <div class="token-select">
          <div id="icoOut" class="token-icon icon-roxs">R</div> <span id="symOut">ROXs</span>
        </div>
      </div>
      <div class="balance-row">
        <span>$0.00</span>
        <span>Balance: <span id="balOut" class="bal-val">0.00</span></span>
      </div>
    </div>

    <button class="btn-action btn-connect" id="connBtn" onclick="connect()">Connect Wallet</button>
    <button class="btn-action btn-swap" id="swapBtn" disabled>Enter an amount</button>
  </div>

<script>
  const ROXS = "0x94Cf8A3041FCA3c7B96D71269B3F9d4c4A07D05E";
  
  let state = {
    connected: false,
    tokenIn: 'POL',
    tokenOut: 'ROXs',
    balances: { POL: 1.00, ROXs: 0.00 }, // Wallet has 1 POL, 0 ROXs
    rate: 12745098 // 13,000,000 / 1.02 ≈ 12.7M
  };

  function calc() {
    const valIn = parseFloat(document.getElementById('valIn').value) || 0;
    const inputEl = document.getElementById('valIn');
    const swapBtn = document.getElementById('swapBtn');
    
    // Real Math: If selling ROXs, divide. If selling POL, multiply.
    let out = state.tokenIn === 'POL' ? valIn * state.rate : valIn / state.rate;
    document.getElementById('valOut').value = out > 0 ? out.toLocaleString(undefined, {maximumFractionDigits: state.tokenIn === 'POL' ? 0 : 4}) : '';

    if (state.connected) {
      const hasEnough = valIn <= state.balances[state.tokenIn];
      inputEl.classList.toggle('insufficient', !hasEnough);
      
      if (!hasEnough) {
        swapBtn.disabled = true;
        swapBtn.textContent = `Insufficient ${state.tokenIn} balance`;
      } else {
        swapBtn.disabled = valIn <= 0;
        swapBtn.textContent = 'Swap';
      }
    }
  }

  function setMax() {
    let fee = state.tokenIn === 'POL' ? 0.04 : 0; // Deduct gas from POL
    let val = state.balances[state.tokenIn] - fee;
    document.getElementById('valIn').value = val > 0 ? val : 0;
    calc();
  }

  function flip() {
    [state.tokenIn, state.tokenOut] = [state.tokenOut, state.tokenIn];
    document.getElementById('symIn').textContent = state.tokenIn;
    document.getElementById('symOut').textContent = state.tokenOut;
    document.getElementById('icoIn').className = `token-icon icon-${state.tokenIn.toLowerCase()}`;
    document.getElementById('icoOut').className = `token-icon icon-${state.tokenOut.toLowerCase()}`;
    refreshUI();
  }

  function refreshUI() {
    const balInEl = document.getElementById('balIn');
    const balOutEl = document.getElementById('balOut');

    if (state.connected) {
      balInEl.textContent = state.balances[state.tokenIn];
      balOutEl.textContent = state.balances[state.tokenOut];
      // Red balance if 0
      balInEl.classList.toggle('red', state.balances[state.tokenIn] === 0);
      balOutEl.classList.toggle('red', state.balances[state.tokenOut] === 0);
    } else {
      balInEl.textContent = "0.00";
      balOutEl.textContent = "0.00";
      balInEl.classList.remove('red');
      balOutEl.classList.remove('red');
    }
    calc();
  }

  function connect() {
    state.connected = true;
    document.getElementById('connBtn').style.display = 'none';
    document.getElementById('swapBtn').style.display = 'block';
    document.getElementById('walletActive').style.display = 'flex';
    document.getElementById('maxBtn').style.display = 'inline';
    refreshUI();
  }

  function disconnect() {
    state.connected = false;
    document.getElementById('connBtn').style.display = 'block';
    document.getElementById('swapBtn').style.display = 'none';
    document.getElementById('walletActive').style.display = 'none';
    document.getElementById('maxBtn').style.display = 'none';
    document.getElementById('valIn').value = '';
    document.getElementById('valOut').value = '';
    refreshUI();
  }

  document.getElementById('swapBtn').onclick = () => {
    const amt = document.getElementById('valIn').value;
    const inAsset = state.tokenIn === 'POL' ? 'ETH' : ROXS;
    const outAsset = state.tokenOut === 'ROXs' ? ROXS : 'ETH';
    
    // Redirect to real Uniswap V2 on Polygon
    const url = `https://app.uniswap.org/swap?inputCurrency=${inAsset}&outputCurrency=${outAsset}&exactAmount=${amt}&chain=polygon&use=V2`;
    window.open(url, '_blank');
  };
</script>
</body>
</html>
