<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXs Swap</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body { background:#0b0b12; color:#fff; font-family:Arial; display:flex; justify-content:center; padding:40px }
.card { width:420px; background:#141421; padding:20px; border-radius:20px }
input { width:100%; padding:12px; background:#1f1f2e; border:none; color:#fff; font-size:18px; border-radius:10px }
select { padding:10px; border-radius:10px; background:#1f1f2e; color:#fff }
button { width:100%; padding:14px; margin-top:10px; border:none; border-radius:12px; background:gold; font-weight:bold; cursor:pointer }
.row { display:flex; justify-content:space-between; margin-bottom:10px }
.small { font-size:12px; color:#888 }
.slip button { margin:2px; padding:6px 10px; border-radius:8px; background:#222 }
.active { background:gold !important; color:#000 }
</style>
</head>

<body>

<div class="card">

<h2>ROXs Swap</h2>

<div class="slip">
Slippage:
<button class="active" onclick="setSlip(this,'auto')">Auto</button>
<button onclick="setSlip(this,0.5)">0.5%</button>
<button onclick="setSlip(this,1)">1%</button>
<button onclick="setSlip(this,3)">3%</button>
<button onclick="setSlip(this,5.5)">5.5%</button>
</div>

<br>

<div>
<div class="row">
<span>You Pay</span>
<span class="small">Balance: <span id="balIn">0</span></span>
</div>

<input id="amountIn" placeholder="0.0" oninput="calc()" />

<select id="tokenIn" onchange="calc()">
<option value="POL">POL</option>
<option value="USDT">USDT</option>
<option value="ROXS">ROXs</option>
</select>
</div>

<br>

<button onclick="flip()">⇅</button>

<br>

<div>
<div class="row">
<span>You Receive</span>
<span class="small">Balance: <span id="balOut">0</span></span>
</div>

<input id="amountOut" disabled />

<select id="tokenOut" onchange="calc()">
<option value="ROXS">ROXs</option>
<option value="POL">POL</option>
<option value="USDT">USDT</option>
</select>
</div>

<div class="small" id="route"></div>

<button onclick="connect()">Connect Wallet</button>
<button onclick="swap()">Swap</button>

</div>

<script>

const ROXS = "0x94Cf8A3041FCA3c7B96D71269B3F9d4c4A07D05E";
const USDT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";

let provider, signer, address;
let slippage = 1;

const prices = {
  POL: 0.22,
  USDT: 1,
  ROXS: 0.000000007158
};

function setSlip(btn,val){
document.querySelectorAll(".slip button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
slippage = val === "auto" ? 1 : val
calc()
}

function flip(){
let a = tokenIn.value
tokenIn.value = tokenOut.value
tokenOut.value = a
calc()
}

async function connect(){
if(!window.ethereum) return alert("Install MetaMask")

provider = new ethers.providers.Web3Provider(window.ethereum)
await provider.send("eth_requestAccounts", [])
signer = provider.getSigner()
address = await signer.getAddress()

updateBalances()
}

async function updateBalances(){
const ERC20 = ["function balanceOf(address) view returns(uint)","function decimals() view returns(uint8)"]

const pol = await provider.getBalance(address)
document.getElementById("balIn").innerText = ethers.utils.formatEther(pol).slice(0,6)

const roxsC = new ethers.Contract(ROXS,ERC20,provider)
const roxs = await roxsC.balanceOf(address)
document.getElementById("balOut").innerText = ethers.utils.formatUnits(roxs,18).slice(0,6)
}

function calc(){
let amount = parseFloat(amountIn.value || 0)
if(!amount) return amountOut.value = ""

let from = tokenIn.value
let to = tokenOut.value

let usd = amount * prices[from]
let out = (usd / prices[to]) * 0.98

amountOut.value = out.toFixed(6)

document.getElementById("route").innerText =
from + " → " + to + " | Slippage: " + slippage + "%"
}

function swap(){

let from = tokenIn.value
let to = tokenOut.value

let input =
from === "POL" ? "ETH" :
from === "USDT" ? USDT : ROXS

let output =
to === "POL" ? "ETH" :
to === "USDT" ? USDT : ROXS

let url = `https://app.uniswap.org/swap?inputCurrency=${input}&outputCurrency=${output}&chain=polygon`

window.open(url,"_blank")
}

</script>

</body>
</html>
