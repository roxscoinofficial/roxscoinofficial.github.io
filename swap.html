<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXs Swap</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
:root {
  --gold:#F0C040;
  --bg:#0c0c14;
  --card:#141421;
  --card2:#1c1c2b;
  --text:#fff;
  --muted:#888;
}

body{
  background: radial-gradient(circle at top,#1a1a2e,#0c0c14);
  color:var(--text);
  font-family:Arial;
  display:flex;
  justify-content:center;
  padding:40px;
}

.swap{
  width:420px;
  background:var(--card);
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 60px rgba(240,192,64,0.08);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

.box{
  background:var(--card2);
  border-radius:16px;
  padding:15px;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:13px;
  color:var(--muted);
}

input{
  width:100%;
  background:none;
  border:none;
  color:white;
  font-size:26px;
  outline:none;
}

select{
  background:#222;
  border:none;
  padding:8px;
  border-radius:10px;
  color:white;
}

.center{
  text-align:center;
  margin:10px 0;
}

.swap-btn{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,#F0C040,#C8860A);
  border:none;
  border-radius:14px;
  font-weight:bold;
  cursor:pointer;
}

.slippage{
  display:flex;
  gap:6px;
  margin-bottom:15px;
}

.slippage button{
  flex:1;
  padding:6px;
  border:none;
  border-radius:8px;
  background:#222;
  color:#aaa;
  cursor:pointer;
}

.slippage .active{
  background:var(--gold);
  color:black;
}

.route{
  font-size:12px;
  color:#888;
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<div class="swap">

<h2>ROXs Swap</h2>

<div class="slippage">
<button class="active" onclick="setSlip(this,'auto')">Auto</button>
<button onclick="setSlip(this,0.5)">0.5%</button>
<button onclick="setSlip(this,1)">1%</button>
<button onclick="setSlip(this,3)">3%</button>
<button onclick="setSlip(this,5.5)">5.5%</button>
</div>

<div class="box">
<div class="row">
<span>You pay</span>
<span>Balance: <span id="balIn">0</span></span>
</div>

<input id="amountIn" oninput="calc()" placeholder="0.0">

<select id="tokenIn" onchange="calc()">
<option value="POL">POL</option>
<option value="USDT">USDT</option>
<option value="ROXS">ROXs</option>
</select>
</div>

<div class="center">
<button onclick="flip()">⇅</button>
</div>

<div class="box">
<div class="row">
<span>You receive</span>
<span>Balance: <span id="balOut">0</span></span>
</div>

<input id="amountOut" disabled>

<select id="tokenOut" onchange="calc()">
<option value="ROXS">ROXs</option>
<option value="POL">POL</option>
<option value="USDT">USDT</option>
</select>
</div>

<div class="route" id="route"></div>

<button class="swap-btn" onclick="connect()">Connect Wallet</button>
<button class="swap-btn" onclick="swap()">Swap</button>

</div>

<script>

const ROXS = "0x94Cf8A3041FCA3c7B96D71269B3F9d4c4A07D05E";
const USDT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";

let provider, signer, address;
let slippage = 1;

const prices = {
  POL:0.22,
  USDT:1,
  ROXS:0.000000007158
};

function setSlip(btn,val){
document.querySelectorAll(".slippage button").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
slippage = val==="auto"?1:val
calc()
}

function flip(){
let a = tokenIn.value
tokenIn.value = tokenOut.value
tokenOut.value = a
calc()
}

async function connect(){
if(!window.ethereum) return alert("Install MetaMask")

provider = new ethers.providers.Web3Provider(window.ethereum)
await provider.send("eth_requestAccounts",[])
signer = provider.getSigner()
address = await signer.getAddress()

updateBalances()
alert("Connected: "+address)
}

async function updateBalances(){

const ERC20 = ["function balanceOf(address) view returns(uint)"]

// POL
let pol = await provider.getBalance(address)
document.getElementById("balIn").innerText =
ethers.utils.formatEther(pol).slice(0,6)

// ROXs
let roxsC = new ethers.Contract(ROXS,ERC20,provider)
let roxs = await roxsC.balanceOf(address)
document.getElementById("balOut").innerText =
ethers.utils.formatUnits(roxs,18).slice(0,6)
}

function calc(){

let amount = parseFloat(amountIn.value||0)
if(!amount){ amountOut.value=""; return }

let from = tokenIn.value
let to = tokenOut.value

let usd = amount * prices[from]
let out = (usd / prices[to]) * 0.98

amountOut.value = out.toFixed(6)

document.getElementById("route").innerText =
`${from} → ${to} | Slippage ${slippage}%`
}

function swap(){

let from = tokenIn.value
let to = tokenOut.value

let input =
from==="POL"?"ETH":
from==="USDT"?USDT:ROXS

let output =
to==="POL"?"ETH":
to==="USDT"?USDT:ROXS

let url = `https://app.uniswap.org/#/swap?chain=polygon&inputCurrency=${input}&outputCurrency=${output}`

window.open(url,"_blank")
}

</script>

</body>
</html>
