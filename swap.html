<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROXs Swap — Quantum Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f0ff;
            --pink: #ff00ea;
            --dark: #020408;
            --border: rgba(0, 240, 255, 0.15);
            --text-dim: rgba(255,255,255,0.6);
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        canvas { position:fixed; top:0; left:0; z-index:0; pointer-events:none; }
        nav {
            position: relative; z-index: 10;
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(15px);
        }
        .nav-logo {
            font-family: 'Orbitron'; font-size: 1.2rem; font-weight: 900;
            background: linear-gradient(90deg, var(--cyan), var(--pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 2px; text-decoration: none;
        }
        .btn-connect {
            font-family: 'Space Mono'; font-size: 0.75rem;
            padding: 10px 20px; border-radius: 30px;
            border: 1px solid var(--cyan); background: transparent;
            color: var(--cyan); cursor: pointer; transition: 0.3s;
            white-space: nowrap;
        }
        .btn-connect:hover { background: rgba(0,240,255,0.1); box-shadow: 0 0 15px rgba(0,240,255,0.3); }
        .btn-connect.connected { border-color: var(--pink); color: var(--pink); }
        main {
            flex: 1; display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 1; padding: 40px 20px;
        }
        .swap-card {
            width: 100%; max-width: 420px;
            background: rgba(10,14,26,0.85);
            border: 1px solid var(--border);
            border-radius: 24px; padding: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 20px rgba(0,240,255,0.05);
        }
        .swap-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }
        .swap-header h2 { font-family: 'Orbitron'; font-size: 1rem; letter-spacing: 1px; color: var(--cyan); }
        .input-group {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 16px 18px;
            margin-bottom: 8px; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-group:focus-within { border-color: rgba(0,240,255,0.35); box-shadow: 0 0 14px rgba(0,240,255,0.08); }
        .input-label { font-family: 'Space Mono'; font-size: 0.72rem; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .amount-input {
            background: none; border: none; color: white;
            font-family: 'Space Mono'; font-size: 2rem; font-weight: 700;
            width: 0; flex: 1; outline: none; min-width: 0;
        }
        .amount-input::placeholder { color: rgba(255,255,255,0.25); }
        .token-selector {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 7px 12px; border-radius: 40px;
            cursor: pointer; transition: 0.2s;
            white-space: nowrap; flex-shrink: 0;
            position: relative;
        }
        .token-selector:hover { background: rgba(255,255,255,0.11); }
        .token-selector select { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; }
        .token-icon-img { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
        .token-name { font-family: 'Orbitron'; font-size: 0.82rem; font-weight: 700; color: #fff; }
        .token-chevron { font-size: 0.6rem; color: var(--text-dim); margin-left: 2px; }
        .balance-row { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
        .usd-value { font-family: 'Space Mono'; font-size: 0.72rem; color: var(--text-dim); }
        .balance-text { font-family: 'Space Mono'; font-size: 0.72rem; color: var(--text-dim); }
        .swap-divider {
            height: 40px; margin: -24px 0;
            display: flex; justify-content: center; align-items: center;
            position: relative; z-index: 2;
        }
        .arrow-btn {
            width: 36px; height: 36px;
            background: #0d1220; border: 1px solid rgba(0,240,255,0.2);
            border-radius: 10px; color: var(--cyan);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-size: 1rem; user-select: none;
        }
        .arrow-btn:hover { border-color: var(--cyan); transform: rotate(180deg); box-shadow: 0 0 15px rgba(0,240,255,0.2); }
        .btn-swap-execute {
            width: 100%; margin-top: 20px; padding: 16px; border-radius: 16px;
            border: none; font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem;
            letter-spacing: 2px; cursor: pointer;
            background: rgba(255,255,255,0.05); color: var(--text-dim); transition: 0.3s;
        }
        .btn-swap-execute.active {
            background: linear-gradient(90deg, var(--pink), var(--cyan)); color: #000;
            box-shadow: 0 0 20px rgba(255,0,234,0.4); cursor: pointer;
        }
        .btn-swap-execute.active:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(0,240,255,0.4); }
        .price-row {
            display: flex; justify-content: space-between;
            font-family: 'Space Mono'; font-size: 0.7rem; color: var(--text-dim); margin: 12px 4px 0;
        }
        footer {
            position: relative; z-index: 10; padding: 20px; text-align: center;
            font-family: 'Space Mono'; font-size: 0.7rem;
            color: var(--text-dim); border-top: 1px solid var(--border);
        }
        /* MetaMask modal */
        .mm-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
            align-items: center; justify-content: center;
        }
        .mm-overlay.show { display: flex; }
        .mm-modal {
            background: #0a0e1a; border: 1px solid var(--border);
            border-radius: 20px; padding: 28px; max-width: 340px; width: 90%;
            box-shadow: 0 0 40px rgba(0,240,255,0.12);
            text-align: center;
        }
        .mm-modal h3 { font-family: 'Orbitron'; color: var(--cyan); margin-bottom: 12px; font-size: 1rem; }
        .mm-modal p { font-family: 'Space Mono'; font-size: 0.72rem; color: var(--text-dim); margin-bottom: 20px; line-height: 1.6; }
        .mm-btn {
            display: inline-block; font-family: 'Orbitron'; font-size: 0.8rem;
            padding: 12px 24px; border-radius: 30px; border: none; cursor: pointer;
            background: linear-gradient(90deg, var(--pink), var(--cyan)); color: #000;
            font-weight: 900; letter-spacing: 1px; transition: 0.3s; margin: 4px;
        }
        .mm-btn:hover { transform: scale(1.04); }
        .mm-btn-outline {
            background: transparent; border: 1px solid var(--border); color: var(--text-dim);
        }
        .mm-btn-outline:hover { border-color: var(--cyan); color: var(--cyan); transform: none; }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <!-- MetaMask Modal -->
    <div class="mm-overlay" id="mmOverlay">
        <div class="mm-modal">
            <h3>🦊 CONECTAR WALLET</h3>
            <p>Conectá tu MetaMask para interactuar con el protocolo ROXs en Polygon.</p>
            <button class="mm-btn" id="mmConnectBtn">CONECTAR METAMASK</button><br>
            <button class="mm-btn mm-btn-outline" id="mmCancelBtn">CANCELAR</button>
        </div>
    </div>

    <nav>
        <a href="#" class="nav-logo">ROXs SWAP</a>
        <button class="btn-connect" id="connectBtn">CONNECT WALLET</button>
    </nav>

    <main>
        <div class="swap-card">
            <div class="swap-header">
                <h2>SWAP ASSETS</h2>
                <span style="cursor:pointer; opacity:0.5;">⚙️</span>
            </div>

            <!-- SELL -->
            <div class="input-group">
                <div class="input-label">Sell</div>
                <div class="input-row">
                    <input type="text" inputmode="decimal" id="inputAmount" class="amount-input" placeholder="0">
                    <div class="token-selector" id="sellSelector">
                        <img class="token-icon-img" id="sellIcon" src="" alt="">
                        <span class="token-name" id="sellTokenName">POL</span>
                        <span class="token-chevron">▼</span>
                        <select id="sellToken">
                            <option value="POL">POL</option>
                            <option value="USDT">USDT</option>
                        </select>
                    </div>
                </div>
                <div class="balance-row">
                    <span class="usd-value" id="sellUSD">/bin/sh.00</span>
                    <span class="balance-text" id="sellBal">Balance: 0.00</span>
                </div>
            </div>

            <div class="swap-divider">
                <div class="arrow-btn" id="arrowBtn">↓</div>
            </div>

            <!-- BUY -->
            <div class="input-group">
                <div class="input-label">Buy</div>
                <div class="input-row">
                    <input type="text" inputmode="numeric" id="outputAmount" class="amount-input" placeholder="0">
                    <div class="token-selector">
                        <img class="token-icon-img" id="buyIcon" src="" alt="">
                        <span class="token-name">ROXs</span>
                        <span class="token-chevron">▼</span>
                    </div>
                </div>
                <div class="balance-row">
                    <span class="usd-value" id="buyUSD">/bin/sh.00</span>
                    <span class="balance-text" id="buyBal">Balance: 0</span>
                </div>
            </div>

            <div class="price-row">
                <span>Price</span>
                <span id="priceLabel" style="color:var(--cyan);">1 POL = 12.68M ROXs</span>
            </div>

            <button class="btn-swap-execute" id="swapBtn">ENTER AMOUNT</button>

            <div class="price-row" style="margin-top:12px;">
                <span>Slippage Tolerance</span>
                <span style="color:var(--cyan);">0.5%</span>
            </div>
        </div>
    </main>

    <footer>ROXs PROTOCOL © 2026 • BUILT ON POLYGON L2</footer>

    /* ──── UNISWAP LINK ──── */
    const UNISWAP_BASE = 'https://app.uniswap.org/swap?inputCurrency=ETH&outputCurrency=0x94Cf8A3041FCA3c7B96D71269B3F9d4c4A07D05E&exactAmount=1&exactField=input&chain=polygon&use=V2';

    function buildUniswapLink(amount) {
        if (!amount || parseFloat(amount) <= 0) return UNISWAP_BASE;
        return 'https://app.uniswap.org/swap?inputCurrency=ETH&outputCurrency=0x94Cf8A3041FCA3c7B96D71269B3F9d4c4A07D05E&exactAmount=' + amount + '&exactField=input&chain=polygon&use=V2';
    }

    /* ──── DOM refs ──── */
    const sellIcon    = document.getElementById('sellIcon');
    const buyIcon     = document.getElementById('buyIcon');
    const sellToken   = document.getElementById('sellToken');
    const sellName    = document.getElementById('sellTokenName');
    const priceLabel  = document.getElementById('priceLabel');
    const inputEl     = document.getElementById('inputAmount');
    const outputEl    = document.getElementById('outputAmount');
    const sellUSD     = document.getElementById('sellUSD');
    const buyUSD      = document.getElementById('buyUSD');

    /* ──── Init icons ──── */
    function initIcons() {
        sellIcon.src = IMGS.POL;
        buyIcon.src  = IMGS.ROXS_POL;
    }
    initIcons();

    /* ──── Format numbers ──── */
    function formatBuy(n) { return Math.round(n).toLocaleString('en-US'); }

    function updateOutput() {
        const raw = inputEl.value.replace(/[^0-9.]/g,'');
        const val = parseFloat(raw);
        const cfg = RATES[currentToken];
        if (!raw || isNaN(val) || val <= 0) {
            outputEl.value = '';
            sellUSD.textContent = '/bin/sh.00';
            buyUSD.textContent  = '/bin/sh.00';
            swapBtn.innerText = 'ENTER AMOUNT';
            swapBtn.classList.remove('active');
            return;
        }
        outputEl.value = formatBuy(val * cfg.rate);
        const usd = (val * cfg.usdPer).toFixed(2);
        sellUSD.textContent = '$' + usd;
        buyUSD.textContent  = '$' + usd;
        swapBtn.innerText = 'SWAP ASSETS';
        swapBtn.classList.add('active');
    }

    /* ──── Sell input ──── */
    inputEl.addEventListener('input', e => {
        let v = e.target.value.replace(/[^0-9.]/g,'');
        const parts = v.split('.');
        if (parts.length > 2) v = parts[0] + '.' + parts.slice(1).join('');
        e.target.value = v;
        updateOutput();
    });

    /* ──── Buy input (editable, solo enteros) ──── */
    outputEl.addEventListener('input', e => {
        let v = e.target.value.replace(/[^0-9]/g,'');
        e.target.value = v;
        const roxs = parseInt(v,10) || 0;
        const cfg  = RATES[currentToken];
        if (roxs > 0) {
            const sellAmt = roxs / cfg.rate;
            inputEl.value = sellAmt % 1 === 0 ? sellAmt.toString() : parseFloat(sellAmt.toFixed(6)).toString();
            const usd = (sellAmt * cfg.usdPer).toFixed(2);
            sellUSD.textContent = '$' + usd;
            buyUSD.textContent  = '$' + usd;
            swapBtn.innerText = 'SWAP ASSETS';
            swapBtn.classList.add('active');
        } else {
            inputEl.value = '';
            sellUSD.textContent = '/bin/sh.00';
            buyUSD.textContent  = '/bin/sh.00';
            swapBtn.innerText = 'ENTER AMOUNT';
            swapBtn.classList.remove('active');
        }
    });

    /* ──── Token selector change ──── */
    sellToken.addEventListener('change', () => {
        currentToken = sellToken.value;
        sellName.textContent = currentToken;
        const cfg = RATES[currentToken];
        sellIcon.src  = IMGS[currentToken];
        buyIcon.src   = IMGS[cfg.buyImg];
        priceLabel.textContent = cfg.label;
        updateOutput();
    });

    /* ──── Arrow reset ──── */
    document.getElementById('arrowBtn').addEventListener('click', () => {
        inputEl.value = '';
        outputEl.value = '';
        sellUSD.textContent = '/bin/sh.00';
        buyUSD.textContent  = '/bin/sh.00';
        swapBtn.innerText = 'ENTER AMOUNT';
        swapBtn.classList.remove('active');
    });

    /* ──── SWAP BUTTON → Uniswap ──── */
    swapBtn.addEventListener('click', () => {
        if (!swapBtn.classList.contains('active')) return;
        const amount = inputEl.value || '1';
        window.open(buildUniswapLink(amount), '_blank');
    });

    /* ──── CONNECT WALLET → MetaMask ──── */
    connectBtn.addEventListener('click', () => {
        mmOverlay.classList.add('show');
    });

    mmCancelBtn.addEventListener('click', () => {
        mmOverlay.classList.remove('show');
    });

    mmOverlay.addEventListener('click', e => {
        if (e.target === mmOverlay) mmOverlay.classList.remove('show');
    });

    mmConnectBtn.addEventListener('click', async () => {
        if (typeof window.ethereum === 'undefined') {
            alert('MetaMask no está instalado. Instalalo desde metamask.io');
            return;
        }
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            walletAddress = accounts[0];
            const short = walletAddress.slice(0,6) + '...' + walletAddress.slice(-4);
            connectBtn.innerText = short;
            connectBtn.classList.add('connected');
            mmOverlay.classList.remove('show');

            /* Cambiar a Polygon si no está */
            try {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: '0x89' }]
                });
            } catch(sw) {
                if (sw.code === 4902) {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [{
                            chainId: '0x89',
                            chainName: 'Polygon Mainnet',
                            nativeCurrency: { name: 'MATIC', symbol: 'MATIC', decimals: 18 },
                            rpcUrls: ['https://polygon-rpc.com/'],
                            blockExplorerUrls: ['https://polygonscan.com/']
                        }]
                    });
                }
            }
        } catch(err) {
            console.error('MetaMask error:', err);
        }
    });

    /* ──── PARTÍCULAS ──── */
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, pts = [];
    function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    for(let i=0;i<100;i++) pts.push({ x:Math.random(), y:Math.random(), vx:(Math.random()-.5)*.0003, vy:(Math.random()-.5)*.0003, r:Math.random()*2, a:Math.random() });
    function draw(){
        ctx.clearRect(0,0,W,H);
        pts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=1; if(p.x>1)p.x=0; if(p.y<0)p.y=1; if(p.y>1)p.y=0; ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2); ctx.fillStyle='rgba(0,240,255,'+p.a*0.6+')'; ctx.fill(); });
        requestAnimationFrame(draw);
    }
    draw();
    </script>
</body>
</html>
