<script>
const ROXS='0x94Cf8A3041FCA3c7B96D71269B3F9d4c4A07D05E';
const USDT_ADDR='0xc2132D05D31c914a87C6611C10748AEb04B58e8F';

// ⚠️ PON AQUÍ TUS PAIRS REALES
const PAIRS = {
  POL_ROXS: '0xPAIR_POL_ROXS',
  USDT_ROXS: '0xPAIR_USDT_ROXS'
};

let s={
  connected:false,
  addr:'',
  from:'POL',
  to:'ROXs',
  bal:{POL:0,USDT:0,ROXs:0},
  slipVal:0.5
};

// ===== AMM =====
function getAmountOut(amountIn, reserveIn, reserveOut){
  const amountInWithFee = amountIn * 997;
  return (amountInWithFee * reserveOut) / (reserveIn * 1000 + amountInWithFee);
}

// ===== READ RESERVES =====
async function getReserves(pair){
  const data = '0x0902f1ac';

  const res = await window.ethereum.request({
    method: 'eth_call',
    params: [{ to: pair, data }, 'latest']
  });

  const r0 = parseInt(res.slice(2, 66), 16);
  const r1 = parseInt(res.slice(66, 130), 16);

  return [r0, r1];
}

// ===== CORE CALC =====
async function calc(){
  const amtIn = parseFloat(document.getElementById('amtIn').value) || 0;

  if(amtIn <= 0){
    clearAmts();
    return;
  }

  let pair, reserve0, reserve1;
  let reserveIn, reserveOut;
  let amountOut = 0;

  try{

    // ===== SELECCIÓN DE PAR =====
    if(
      (s.from==='POL' && s.to==='ROXs') ||
      (s.from==='ROXs' && s.to==='POL')
    ){
      pair = PAIRS.POL_ROXS;
    }

    if(
      (s.from==='USDT' && s.to==='ROXs') ||
      (s.from==='ROXs' && s.to==='USDT')
    ){
      pair = PAIRS.USDT_ROXS;
    }

    if(!pair){
      clearAmts();
      return;
    }

    [reserve0, reserve1] = await getReserves(pair);

    // ⚠️ IMPORTANTE: orden depende del token0/token1
    // asumimos token0 = ROXs
    if(s.from === 'ROXs'){
      reserveIn = reserve0;
      reserveOut = reserve1;
    }else{
      reserveIn = reserve1;
      reserveOut = reserve0;
    }

    // NORMALIZAR DECIMALES
    let decimalsIn = s.from === 'USDT' ? 6 : 18;
    let decimalsOut = s.to === 'USDT' ? 6 : 18;

    const amountInWei = amtIn * (10 ** decimalsIn);

    const outWei = getAmountOut(amountInWei, reserveIn, reserveOut);

    amountOut = outWei / (10 ** decimalsOut);

    // ===== UI =====
    document.getElementById('amtOut').value = fmtAmt(amountOut, s.to);

    const rate = amountOut / amtIn;

    document.getElementById('rRate').textContent =
      '1 ' + s.from + ' = ' + fmtAmt(rate, s.to) + ' ' + s.to;

    document.getElementById('rMin').textContent =
      fmtAmt(amountOut * (1 - s.slipVal/100), s.to) + ' ' + s.to;

    document.getElementById('rImpact').textContent = '~auto';
    document.getElementById('rRoute').textContent = s.from+' → '+s.to+' (v2)';
    document.getElementById('routeBox').style.display='block';

    updateBtn();

  }catch(e){
    console.log(e);
  }
}

// ===== FORMAT =====
function fmtAmt(n,tok){
  if(tok==='ROXs'){
    if(n>=1e9)return(n/1e9).toFixed(2)+'B';
    if(n>=1e6)return(n/1e6).toFixed(2)+'M';
    if(n>=1000)return Math.round(n).toLocaleString();
    return n.toFixed(0);
  }
  if(n>=1)return n.toFixed(4);
  return n.toFixed(8);
}

// ===== BOTÓN =====
function updateBtn(){
  const btn=document.getElementById('mainBtn');
  const amt=parseFloat(document.getElementById('amtIn').value)||0;

  if(!s.connected){
    btn.textContent='Connect Wallet';
    btn.onclick=openModal;
    return;
  }

  if(amt<=0){
    btn.textContent='Enter amount';
    btn.onclick=null;
    return;
  }

  btn.textContent='Swap';
  btn.onclick=doSwap;
}

// ===== SWAP =====
async function doSwap(){
  const amt=document.getElementById('amtIn').value;

  const map={
    POL:'ETH',
    USDT:USDT_ADDR,
    ROXs:ROXS
  };

  window.open(
    'https://app.uniswap.org/swap?inputCurrency='+map[s.from]+
    '&outputCurrency='+map[s.to]+
    '&exactAmount='+amt+
    '&exactField=input&chain=polygon&use=V2'
  );
}

// ===== CLEAN =====
function clearAmts(){
  document.getElementById('amtOut').value='';
  document.getElementById('routeBox').style.display='none';
}
</script>
