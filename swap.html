<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROXs Swap</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

<style>
:root{
  --gold:#F0C040;
  --bg:#050505;
  --surface:#0f0f0f;
  --surface2:#161616;
  --border:rgba(255,255,255,0.08);
  --muted:#888;
  --error:#ff3b3b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:white;
  font-family:'DM Sans';
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* NAV */
nav{
  width:100%;max-width:440px;
  display:flex;justify-content:space-between;
  margin-bottom:20px;
}
.nav-logo{
  font-family:'Syne';
  font-weight:800;
  color:var(--gold);
  font-size:22px;
}

/* CARD */
.swap-card{
  width:100%;max-width:440px;
  background:var(--surface);
  border-radius:24px;
  padding:20px;
  border:1px solid var(--border);
}

/* TOKEN BOX */
.token-box{
  background:var(--surface2);
  padding:16px;
  border-radius:16px;
  margin-bottom:6px;
}
.label{
  font-size:12px;
  color:var(--muted);
  margin-bottom:10px;
}

.input-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.amount-input{
  background:none;
  border:none;
  color:white;
  font-size:32px;
  font-family:'Syne';
  width:60%;
  outline:none;
}

.red{color:var(--error)!important}

.token-select{
  background:black;
  border:1px solid var(--border);
  border-radius:50px;
  padding:6px 12px;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.token-icon{
  width:24px;height:24px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:bold;
}
.icon-pol{background:#8247e5}
.icon-usdt{background:#26a17b}
.icon-roxs{background:var(--gold);color:black}

.balance-row{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--muted);
  margin-top:10px;
}
.balance-red{color:var(--error)}

.max{
  color:var(--gold);
  cursor:pointer;
  margin-left:8px;
  font-weight:bold;
}

/* ARROW */
.arrow{
  display:flex;
  justify-content:center;
  margin:-18px 0;
}
.arrow button{
  background:var(--surface);
  border:4px solid var(--bg);
  border-radius:10px;
  width:36px;height:36px;
  color:var(--gold);
  cursor:pointer;
}

/* BUTTON */
.btn{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:none;
  margin-top:10px;
  font-family:'Syne';
  font-weight:700;
  cursor:pointer;
}
.connect{background:var(--gold);color:black}
.swap{background:#222;color:#555}
.swap.active{background:var(--gold);color:black}
</style>
</head>

<body>

<nav>
<div class="nav-logo">ROXs</div>
</nav>

<div class="swap-card">

<!-- SELL -->
<div class="token-box">
<div class="label">Vender</div>

<div class="input-row">
<input id="valIn" class="amount-input" placeholder="0" oninput="calc()">

<div class="token-select" onclick="toggleToken()">
<div id="iconIn" class="token-icon icon-pol">P</div>
<span id="symIn">POL</span>
</div>
</div>

<div class="balance-row">
<span>$0.00</span>
<span>
Balance: <span id="balIn">0</span>
<span class="max" onclick="setMax()">MAX</span>
</span>
</div>
</div>

<!-- ARROW -->
<div class="arrow">
<button onclick="flip()">↓</button>
</div>

<!-- BUY -->
<div class="token-box">
<div class="label">Comprar</div>

<div class="input-row">
<input id="valOut" class="amount-input" readonly>
<div class="token-select">
<div class="token-icon icon-roxs">R</div>
ROXs
</div>
</div>
</div>

<button id="btn" class="btn swap">Enter amount</button>

</div>

<script>
const ROXS = "0x94Cf8A3041FCA3c7B96D71269B3F9d4c4A07D05E";
const USDT = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";

let state={
  tokenIn:"POL",
  balance:{POL:1.25,USDT:250,ROXs:0},

  rate:{
    POL:12803400,
    USDT:13500000
  }
}

// CALCULO
function calc(){
  let val=parseFloat(valIn.value)||0
  let bal=state.balance[state.tokenIn]
  let rate=state.rate[state.tokenIn]

  let out=val*rate
  valOut.value=out?Math.floor(out).toLocaleString():""

  valIn.classList.remove("red")

  if(val<=0){
    btn.innerText="Enter amount"
    btn.classList.remove("active")
    return
  }

  if(val>bal){
    valIn.classList.add("red")
    btn.innerText=`No hay suficientes ${state.tokenIn}`
    btn.classList.remove("active")
  }else{
    btn.innerText="Swap"
    btn.classList.add("active")
  }
}

// MAX
function setMax(){
  let val=state.balance[state.tokenIn]

  if(state.tokenIn==="POL"){
    val -= 0.01 // gas estimado
  }

  valIn.value=val.toFixed(4)
  calc()
}

// CAMBIAR TOKEN
function flip(){
  if(state.tokenIn==="POL"){
    state.tokenIn="USDT"
    symIn.innerText="USDT"
    iconIn.className="token-icon icon-usdt"
  }else{
    state.tokenIn="POL"
    symIn.innerText="POL"
    iconIn.className="token-icon icon-pol"
  }
  calc()
}

function toggleToken(){ flip() }

// SWAP → UNISWAP
btn.onclick = () => {
  let val = valIn.value
  if(!val || btn.classList.contains("swap") && !btn.classList.contains("active")) return

  let input =
    state.tokenIn === "POL"
      ? "ETH"
      : USDT

  let url = `https://app.uniswap.org/#/swap?inputCurrency=${input}&outputCurrency=${ROXS}&exactAmount=${val}&chain=polygon`

  window.open(url,"_blank")
}
</script>

</body>
</html>
