<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ROXs Swap PRO</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>
body{background:#0a0e1a;color:#fff;font-family:sans-serif;display:flex;justify-content:center;padding-top:60px}
.box{background:#13161f;padding:20px;border-radius:16px;width:360px}
input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
button{background:#F5A623;font-weight:bold;cursor:pointer}
</style>
</head>

<body>
<div class="box">
<h2>ROXs Swap PRO</h2>

<input id="amount" placeholder="Amount" type="number"/>

<select id="from">
  <option>POL</option>
  <option>USDT</option>
  <option>ROXs</option>
</select>

<select id="to">
  <option>ROXs</option>
  <option>POL</option>
  <option>USDT</option>
</select>

<input id="slippage" value="1" type="number"/>

<button onclick="mainAction()">Connect / Swap</button>

<div id="info"></div>
</div>

<script>
// ─── CONFIG ─────────────────────────
const ROUTER = "0xa5E0829CaCED8fFDD4De3c43696c57F7D7A678ff";
const ROXS   = "0x94Cf8A3041FCA3c7B96D71269B3F9d4c4A07D05E";
const USDT   = "0xc2132D05D31c914a87C6611C10748AEb04B58e8F";
const WMATIC = "0x0d500B1d8E8eF31E21C99d1Db9A6444d3ADf1270";

let provider, signer, account, router;

// ─── CONNECT ───────────────────────
async function connect(){
  provider = new ethers.providers.Web3Provider(window.ethereum);
  await provider.send("eth_requestAccounts", []);
  signer = provider.getSigner();
  account = await signer.getAddress();

  const net = await provider.getNetwork();
  if(net.chainId !== 137){
    alert("Switch to Polygon");
    return;
  }

  router = new ethers.Contract(ROUTER,[
    "function getAmountsOut(uint,address[]) view returns (uint[])",
    "function swapExactETHForTokens(uint,address[],address,uint) payable",
    "function swapExactTokensForTokens(uint,uint,address[],address,uint)"
  ], signer);

  log("Connected: "+account);
}

// ─── PATH ──────────────────────────
function path(from,to){
  const map={POL:WMATIC,USDT:USDT,ROXs:ROXS};
  const A=map[from], B=map[to];

  if(A===B) return null;

  if(A===WMATIC||B===WMATIC) return [A,B];
  return [A,WMATIC,B];
}

// ─── DECIMALS ──────────────────────
async function getDecimals(addr){
  if(addr===WMATIC) return 18;
  const c=new ethers.Contract(addr,["function decimals() view returns(uint8)"],provider);
  return await c.decimals();
}

// ─── ALLOWANCE ─────────────────────
async function checkApprove(token,amount){
  const erc=new ethers.Contract(token,[
    "function allowance(address,address)view returns(uint)",
    "function approve(address,uint)"
  ],signer);

  const allow=await erc.allowance(account,ROUTER);
  if(allow.lt(amount)){
    log("Approving...");
    const tx=await erc.approve(ROUTER,amount);
    await tx.wait();
  }
}

// ─── SWAP ──────────────────────────
async function swap(){
  const amt=document.getElementById("amount").value;
  const from=document.getElementById("from").value;
  const to=document.getElementById("to").value;
  const slip=parseFloat(document.getElementById("slippage").value);

  const p=path(from,to);
  if(!p) return alert("Invalid pair");

  try{
    if(from==="POL"){
      const value=ethers.utils.parseEther(amt);
      const out=await router.getAmountsOut(value,p);
      const min=out[out.length-1].mul(100-slip).div(100);

      const tx=await router.swapExactETHForTokens(
        min,p,account,Date.now()+600,
        {value}
      );

      log("Swapping...");
      await tx.wait();
      log("DONE 🚀");

    }else{
      const dec=await getDecimals(p[0]);
      const amount=ethers.utils.parseUnits(amt,dec);

      await checkApprove(p[0],amount);

      const out=await router.getAmountsOut(amount,p);
      const min=out[out.length-1].mul(100-slip).div(100);

      const tx=await router.swapExactTokensForTokens(
        amount,min,p,account,Date.now()+600
      );

      log("Swapping...");
      await tx.wait();
      log("DONE 🚀");
    }

  }catch(e){
    if(e.code===4001) log("Cancelled");
    else log("Error");
    console.error(e);
  }
}

// ─── MAIN ──────────────────────────
async function mainAction(){
  if(!account) await connect();
  else await swap();
}

function log(t){
  document.getElementById("info").innerText=t;
}
</script>
</body>
</html>
