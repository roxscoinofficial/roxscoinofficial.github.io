<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ROXs Swap - Intercambio Profesional</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #F0C040;
      --bg: #050505;
      --surface: #0f0f0f;
      --surface2: #161616;
      --border: rgba(255,255,255,0.08);
      --text: #ffffff;
      --muted: #888;
      --error: #ff4d4d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex; flex-direction: column; align-items: center; padding: 40px 20px;
    }

    .swap-card {
      width: 100%; max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 20px;
    }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header h2 { font-family: 'Syne', sans-serif; font-size: 18px; }

    .token-box {
      background: var(--surface2); border-radius: 16px; padding: 16px; margin-bottom: 4px;
      border: 1px solid transparent; transition: 0.2s;
    }
    .token-box:hover { border-color: rgba(255,255,255,0.1); }
    .label { font-size: 13px; color: var(--muted); margin-bottom: 10px; display: block; }
    
    .input-row { display: flex; justify-content: space-between; align-items: center; }
    .amount-input {
      background: none; border: none; color: white; font-size: 32px;
      font-family: 'Syne', sans-serif; width: 60%; outline: none;
    }
    
    .token-select {
      background: #000; border: 1px solid var(--border); border-radius: 50px;
      padding: 6px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .token-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
    .icon-pol { background: #8247e5; color: white; }
    .icon-roxs { background: var(--gold); color: black; }

    .balance-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-top: 10px; }
    .max-btn { color: var(--gold); background: none; border: none; cursor: pointer; font-weight: bold; }

    .arrow-swap {
      height: 40px; width: 40px; background: var(--surface); border: 4px solid var(--bg);
      margin: -18px auto; border-radius: 12px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative; z-index: 2; color: var(--gold);
    }

    /* MENSAJE DE ERROR */
    .error-banner {
      background: rgba(255, 77, 77, 0.1); border: 1px solid rgba(255, 77, 77, 0.2);
      color: var(--error); padding: 12px; border-radius: 12px; font-size: 13px;
      margin-top: 12px; display: none; align-items: center; gap: 8px;
    }
    .error-banner.show { display: flex; }

    /* INFO DE RUTA */
    .info-box { padding: 12px; font-size: 12px; color: var(--muted); }
    .info-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .info-row b { color: #eee; }

    .btn-main {
      width: 100%; padding: 18px; border-radius: 16px; border: none;
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px;
      cursor: pointer; margin-top: 10px; transition: 0.3s;
    }
    .btn-swap { background: var(--gold); color: black; }
    .btn-swap:disabled { background: #222; color: #555; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="swap-card">
    <div class="header">
      <h2>Intercambio</h2>
      <span>⚙️</span>
    </div>

    <div class="token-box">
      <span class="label">Vender</span>
      <div class="input-row">
        <input type="number" class="amount-input" id="valIn" placeholder="0" oninput="updateSwap()">
        <div class="token-select">
          <div id="iconIn" class="token-icon icon-pol">P</div>
          <span id="symIn">POL</span>
        </div>
      </div>
      <div class="balance-row">
        <span id="usdIn">$0.00</span>
        <span>Saldo: <span id="balInText">1.00</span> <button class="max-btn" onclick="setMax()">MÁX</button></span>
      </div>
    </div>

    <div class="arrow-swap" onclick="flip()">↓</div>

    <div class="token-box">
      <span class="label">Comprar</span>
      <div class="input-row">
        <input type="number" class="amount-input" id="valOut" placeholder="0" readonly>
        <div class="token-select">
          <div id="iconOut" class="token-icon icon-roxs">R</div>
          <span id="symOut">ROXs</span>
        </div>
      </div>
      <div class="balance-row">
        <span id="usdOut">$0.00</span>
        <span>Saldo: <span id="balOutText">0.00</span></span>
      </div>
    </div>

    <div class="error-banner" id="errorMsg">
      ⚠️ No hay suficientes <span id="errToken">POL</span> para intercambiar
    </div>

    <div class="info-box" id="details" style="display:none">
      <div class="info-row"><span>Tasa de cambio</span> <b id="rateText">1 POL = 12.6M ROXs</b></div>
      <div class="info-row"><span>Comisión de red</span> <b>~$0.01</b></div>
    </div>

    <button class="btn-main btn-swap" id="swapBtn" disabled>Intercambiar</button>
  </div>

<script>
  // ESTADO INICIAL (Billetera con 1 POL y 0 ROXs)
  let state = {
    tokenIn: 'POL',
    tokenOut: 'ROXs',
    balances: { POL: 1.00, ROXs: 0.00 },
    prices: { POL: 0.22, ROXs: 0.00000001734 }, // Tasa según tu dato de Uniswap
    rate: 12687300 // 1 POL = 12,687,300 ROXs
  };

  function updateSwap() {
    const valIn = parseFloat(document.getElementById('valIn').value) || 0;
    const valOutEl = document.getElementById('valOut');
    const swapBtn = document.getElementById('swapBtn');
    const errorMsg = document.getElementById('errorMsg');
    const details = document.getElementById('details');

    if (valIn <= 0) {
      valOutEl.value = '';
      swapBtn.disabled = true;
      errorMsg.classList.remove('show');
      details.style.display = 'none';
      return;
    }

    // Calcular salida
    let result;
    if(state.tokenIn === 'POL') {
      result = valIn * state.rate;
    } else {
      result = valIn / (state.rate * 1.01); // 1% spread al vender ROXs
    }
    
    valOutEl.value = result.toLocaleString('en-US', {maximumFractionDigits: 0}).replace(/,/g, '');
    
    // Mostrar USD
    document.getElementById('usdIn').textContent = '$' + (valIn * state.prices[state.tokenIn]).toFixed(2);
    document.getElementById('usdOut').textContent = '$' + (result * state.prices[state.tokenOut]).toFixed(2);

    // VALIDACIÓN DE SALDO REAL
    const hasEnough = valIn <= state.balances[state.tokenIn];
    
    if (!hasEnough) {
      errorMsg.classList.add('show');
      document.getElementById('errToken').textContent = state.tokenIn;
      swapBtn.disabled = true;
      swapBtn.textContent = 'Saldo insuficiente';
    } else {
      errorMsg.classList.remove('show');
      swapBtn.disabled = false;
      swapBtn.textContent = 'Intercambiar';
    }

    details.style.display = 'block';
    document.getElementById('rateText').textContent = `1 POL = ${state.rate.toLocaleString()} ROXs`;
  }

  function flip() {
    // Intercambiar tokens
    [state.tokenIn, state.tokenOut] = [state.tokenOut, state.tokenIn];
    
    // Actualizar UI
    document.getElementById('symIn').textContent = state.tokenIn;
    document.getElementById('symOut').textContent = state.tokenOut;
    document.getElementById('iconIn').className = `token-icon icon-${state.tokenIn.toLowerCase()}`;
    document.getElementById('iconOut').className = `token-icon icon-${state.tokenOut.toLowerCase()}`;
    document.getElementById('iconIn').textContent = state.tokenIn[0];
    document.getElementById('iconOut').textContent = state.tokenOut[0];
    
    // Actualizar Saldos mostrados
    document.getElementById('balInText').textContent = state.balances[state.tokenIn].toLocaleString();
    document.getElementById('balOutText').textContent = state.balances[state.tokenOut].toLocaleString();
    
    // Resetear y recalcular
    document.getElementById('valIn').value = '';
    updateSwap();
  }

  function setMax() {
    document.getElementById('valIn').value = state.balances[state.tokenIn];
    updateSwap();
  }

  // Inicializar saldos al cargar
  window.onload = () => {
    document.getElementById('balInText').textContent = state.balances.POL.toFixed(2);
    document.getElementById('balOutText').textContent = state.balances.ROXs.toFixed(2);
  };
</script>
</body>
</html>
